; Sonos Nest — ELECROW CrowPanel 2.1" HMI ESP32-S3 Rotary Display (DHE03921D)
; ESP32-S3R8: dual-core 240 MHz, 8 MB OPI PSRAM, 16 MB flash, ST7701 480x480 RGB panel.
; See plans/01-sonos-knob-controller-plan.md for the full architecture.
;
; Envs:
;   crowpanel-rotary  -> the normal app
;   bringup           -> Phase-0 serial subsystem self-test (-DPHASE0_BRINGUP)

[platformio]
default_envs = crowpanel-rotary

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- ESP32-S3R8: enable 8 MB OPI PSRAM + 16 MB flash ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1      ; USB-CDC serial over the USB-C port
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE         ; LVGL looks for lv_conf.h on the include path
    -I include
    ; -DSONOS_ZONE_IP=\"192.168.1.50\"  ; uncomment to bypass SSDP during dev (Phase 1)

lib_deps =
    lvgl/lvgl@^9.2.0
    ; Pinned to 1.3.1 — the version Elecrow's example targets. The 1.4.x refactor
    ; (Arduino_SWSPI + Arduino_RGB_Display) drops the Arduino_ST7701_RGBPanel /
    ; Arduino_ESP32RGBPanel(CS,SCK,SDA,DE,…) API that display.cpp uses. Do NOT bump
    ; without rewriting display.cpp. (git tag/SHA: v1.3.1 / 3e4f9a0…)
    moononournation/GFX Library for Arduino@1.3.1
    bblanchon/ArduinoJson@^7.1.0
    bodmer/TJpg_Decoder@^1.1.0
    madhephaestus/ESP32Encoder@^0.11.7

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

[env:crowpanel-rotary]
; normal application build

[env:bringup]
; Phase-0 hardware self-test over serial. Build/flash with: pio run -e bringup -t upload
build_flags =
    ${env.build_flags}
    -DPHASE0_BRINGUP
